name: Bot CR7 SIUUU Diário

on:
  schedule:
    - cron: '0 9 * * *' # Roda automaticamente às 06h BRT como segurança
  workflow_dispatch:
    inputs:
      site_token:
        description: 'Token de Acesso do Site'
        required: false
        default: '8f88b4c964'

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Rodar o Robô Scraper
        env:
          SITE_TOKEN: ${{ github.event.inputs.site_token || '8f88b4c964' }}
        run: |
          python scraper.py
